version: "3.8"

x-common-env: &common-env
  AGENTE_LLM_BASE_URL=http://ollama:11434
  AGENTE_LOCAL_MODEL=qwen2.5:1.5b
  AGENTE_VAULT=/app/Obsidian_Vault
  PYTHONIOENCODING=utf-8
  OMP_NUM_THREADS=2

x-app-volumes: &app-volumes
  - ./cli_python:/app/cli_python
  - ./Obsidian_Vault:/app/Obsidian_Vault
  - ./requirements.txt:/app/requirements.txt

x-ollama-dep: &ollama-dep
  ollama:
    condition: service_started

services:
  ollama:
    image: ollama/ollama:latest
    container_name: agente-ollama
    restart: unless-stopped
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
      - ./ollama-entrypoint.sh:/entrypoint.sh
    entrypoint: ["/entrypoint.sh"]
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:11434/api/tags"]
      interval: 30s
      timeout: 10s
      retries: 20
      start_period: 120s
    networks:
      - agente-net

  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-api
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      <<: *common-env
    volumes: *app-volumes
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agente-net
    command: >
      sh -c "cd /app/cli_python && uvicorn api:app --host 0.0.0.0 --port 8000 --reload"

  dashboard:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-dashboard
    restart: unless-stopped
    ports:
      - "8501:8501"
    environment:
      <<: *common-env
    volumes: *app-volumes
    depends_on:
      - api
    networks:
      - agente-net
    command: >
      sh -c "cd /app/cli_python && streamlit run dashboard.py --server.port 8501 --server.address 0.0.0.0"

  n8n:
    image: n8nio/n8n:latest
    container_name: agente-n8n
    restart: unless-stopped
    ports:
      - "5678:5678"
    environment:
      - N8N_PORT=5678
      - N8N_PROTOCOL=http
      - N8N_HOST=localhost
      - WEBHOOK_FAILURE_URL=
      - AGENTE_LLM_BASE_URL=http://ollama:11434
    volumes:
      - n8n_data:/home/node/.n8n
      - ./cli_python:/data/scripts
    depends_on:
      - ollama
    networks:
      - agente-net

  cli:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: agente-cli
    environment:
      <<: *common-env
    volumes: *app-volumes
    depends_on:
      ollama:
        condition: service_healthy
    networks:
      - agente-net
    profiles:
      - cli-only
    stdin_open: true
    tty: true
    command: >
      sh -c "cd /app/cli_python && python cli.py chat"

volumes:
  ollama_data:
  n8n_data:

networks:
  agente-net:
    driver: bridge
