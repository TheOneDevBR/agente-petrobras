target-version = "py311"
line-length = 120

[lint]
select = [
    "E",    # pycodestyle errors
    "F",    # pyflakes
    "I",    # isort
    "N",    # pep8-naming
    "W",    # pycodestyle warnings
    "UP",   # pyupgrade
    "S",    # bandit (security)
]
ignore = [
    "E501",    # line-too-long (handled by ruff format)
    "S101",    # assert allowed in tests
    "N802",    # function names can have underscores
    "N803",    # argument names can be lowercase
    "N806",    # variable names can be lowercase
    "E701",    # allow `if x: return` on same line
]

[format]
quote-style = "double"
indent-style = "space"
