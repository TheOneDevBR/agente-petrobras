name: Frontend

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  build-test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint || true   # nao bloqueia por avisos pre-existentes

      - name: Build (typecheck + vite)
        run: npm run build

      - name: Testes (vitest)
        run: npm test
